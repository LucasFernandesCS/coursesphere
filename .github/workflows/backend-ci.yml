name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Run backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coursesphere
          POSTGRES_PASSWORD: coursesphere
          POSTGRES_DB: coursesphere_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U coursesphere -d coursesphere_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://coursesphere:coursesphere@localhost:5432/coursesphere_test?schema=public
      JWT_SECRET: coursesphere_secret
      PORT: 3000

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build
